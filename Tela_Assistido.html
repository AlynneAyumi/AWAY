<!DOCTYPE html>
<html>
<head>
    <title>Perfil do Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="menu-lateral">
            <button id="btnTeste">Teste</button>
        </div>
        <div class="conteudo" id="conteudo">
            <h1>Perfil do Usuário</h1>
            <form>
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" value="José Fulano da Silva Machado">

                    <label for="Data de Nascimento">Data de Nascimento:</label>
                    <input type="date" id="Data de Nascimento" name="Data de Nascimento" value="1990-01-01">

                    <label for="idade">Idade:</label>
                    <input type="number" id="idade" name="idade" value="30">

                    <lavel for="CPF">CPF:</label>
                    <input type="text" id="CPF" name="CPF" value="123.456.789-10">

                    <label for="Telefone">Telefone:</label>
                    <input type="text" id="Telefone" name="Telefone" value="1234-5678">

                    <label for="Telefone_2">Telefone (Outro p/ contato):</label>
                    <input type="text" id="Telefone_2" name="Telefone_2" value="1234-5678">

                    <label for="Sexo">Sexo:</label>
                    <select id="Sexo" name="Sexo">
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>

                </div>
                </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
