<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="/Estilos/style.css">
    <link rel="stylesheet" href="/Estilos/style-assistido.css">
    <title>AWAY</title>
</head>
<body>
    <div id="header"></div> <!-- Header será incluído aqui -->

    <main class="container-fluid">
        <div class="row">
            <!-- Coluna esquerda - Perfil do Usuário -->
            <div class="col-md-6 p-4 shadow-sm rounded bg-light profile-container">
                <h1 class="text-primary">Novo Cadastro</h1>
                <ul class="nav nav-tabs" id="profileTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <a class="nav-link active" id="perfil-tab" data-bs-toggle="tab" href="#perfil" role="tab" aria-controls="perfil" aria-selected="true">Perfil</a>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link" id="endereco-tab" data-bs-toggle="tab" href="#endereco" role="tab" aria-controls="endereco" aria-selected="false">Endereço</a>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link" id="arquivos-tab" data-bs-toggle="tab" href="#arquivos" role="tab" aria-controls="arquivos" aria-selected="false">Arquivos</a>
                    </li>
                </ul>
                <div class="tab-content" id="profileTabContent">
                    <div class="tab-pane fade show active" id="perfil" role="tabpanel" aria-labelledby="perfil-tab">
                        <form>
                            <div class="form-group mb-3">
                                <label for="nome">Nome Completo:</label>
                                <input type="text" class="form-control" id="nome" name="nome">
                            </div>

                            <div class="form-group mb-3">
                                <label for="dataNascimento">Data de Nascimento:</label>
                                <input type="date" class="form-control" id="dataNascimento" name="dataNascimento">
                            </div>

                            <div class="form-group mb-3">
                                <label for="idade">Idade:</label>
                                <input type="number" class="form-control" id="idade" name="idade">
                            </div>

                            <div class="form-group mb-3">
                                <label for="cpf">CPF:</label>
                                <input type="text" class="form-control" id="cpf" name="cpf" placeholder="xxx.xxx.xxx-xx">
                            </div>

                            <div class="form-group mb-3">
                                <label for="telefone">Telefone:</label>
                                <input type="text" class="form-control" id="telefone" name="telefone">
                            </div>

                            <div class="form-group mb-3">
                                <label for="telefone2">Telefone (Outro p/ contato):</label>
                                <input type="text" class="form-control" id="telefone2" name="telefone2">
                            </div>

                            <div class="form-group mb-3">
                                <label for="sexo">Sexo:</label>
                                <select class="form-select" id="sexo" name="sexo">
                                    <option value="Masculino">Masculino</option>
                                    <option value="Feminino">Feminino</option>
                                </select>
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="endereco" role="tabpanel" aria-labelledby="endereco-tab">
                        <form>
                            <div class="form-group mb-3">
                                <label for="rua">Rua:</label>
                                <input type="text" class="form-control" id="rua" name="rua">
                            </div>

                            <div class="form-group mb-3">
                                <label for="numero">Número:</label>
                                <input type="text" class="form-control" id="numero" name="numero">
                            </div>

                            <div class="form-group mb-3">
                                <label for="bairro">Bairro:</label>
                                <input type="text" class="form-control" id="bairro" name="bairro">
                            </div>

                            <div class="form-group mb-3">
                                <label for="cidade">Cidade:</label>
                                <input type="text" class="form-control" id="cidade" name="cidade">
                            </div>

                            <div class="form-group mb-3">
                                <label for="cep">CEP:</label>
                                <input type="text" class="form-control" id="cep" name="cep">
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="arquivos" role="tabpanel" aria-labelledby="arquivos-tab">
                        <form>
                            <div class="form-group mb-3">
                                <label for="arquivos">Selecionar Arquivos:</label>
                                <input type="file" class="form-control" id="arquivos" name="arquivos" multiple>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end">
                <button class="btn btn-success" id="save-presence-btn">Salvar</button>
            </div>

    </main>

    <script src="/Scripts/script.js"></script>
    <script src="/Scripts/carregar-menu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
