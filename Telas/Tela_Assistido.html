<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="/Estilos/style.css">
    <link rel="stylesheet" href="/Estilos/style-assistido.css">
    <title>Perfil do Usuário</title>
</head>
<body>
    <div id="header"></div>
    <main class="container-fluid">
        <div class="row">
            <!-- Coluna esquerda - Perfil do Usuário -->
            <div class="col-md-6 p-4 shadow-sm rounded bg-light profile-container">
                <h1 class="text-primary">Perfil do Usuário</h1>
                <ul class="nav nav-tabs" id="profileTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <a class="nav-link active" id="perfil-tab" data-bs-toggle="tab" href="#perfil" role="tab" aria-controls="perfil" aria-selected="true">Perfil</a>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link" id="endereco-tab" data-bs-toggle="tab" href="#endereco" role="tab" aria-controls="endereco" aria-selected="false">Endereço</a>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link" id="arquivos-tab" data-bs-toggle="tab" href="#arquivos" role="tab" aria-controls="arquivos" aria-selected="false">Arquivos</a>
                    </li>
                </ul>
                <div class="tab-content" id="profileTabContent">
                    <div class="tab-pane fade show active" id="perfil" role="tabpanel" aria-labelledby="perfil-tab">
                        <form>
                            <div class="form-group mb-3">
                                <label for="nome">Nome Completo:</label>
                                <input type="text" class="form-control" id="nome" name="nome" value="José Fulano da Silva Machado">
                            </div>

                            <div class="form-group mb-3">
                                <label for="dataNascimento">Data de Nascimento:</label>
                                <input type="date" class="form-control" id="dataNascimento" name="dataNascimento" value="1990-01-01">
                            </div>

                            <div class="form-group mb-3">
                                <label for="idade">Idade:</label>
                                <input type="number" class="form-control" id="idade" name="idade" value="30">
                            </div>

                            <div class="form-group mb-3">
                                <label for="cpf">CPF:</label>
                                <input type="text" class="form-control" id="cpf" name="cpf" value="123.456.789-10">
                            </div>

                            <div class="form-group mb-3">
                                <label for="telefone">Telefone:</label>
                                <input type="text" class="form-control" id="telefone" name="telefone" value="1234-5678">
                            </div>

                            <div class="form-group mb-3">
                                <label for="telefone2">Telefone (Outro p/ contato):</label>
                                <input type="text" class="form-control" id="telefone2" name="telefone2" value="1234-5678">
                            </div>

                            <div class="form-group mb-3">
                                <label for="sexo">Sexo:</label>
                                <select class="form-select" id="sexo" name="sexo">
                                    <option value="Masculino">Masculino</option>
                                    <option value="Feminino">Feminino</option>
                                </select>
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="endereco" role="tabpanel" aria-labelledby="endereco-tab">
                        <form>
                            <div class="form-group mb-3">
                                <label for="rua">Rua:</label>
                                <input type="text" class="form-control" id="rua" name="rua" value="Rua Exemplo">
                            </div>

                            <div class="form-group mb-3">
                                <label for="numero">Número:</label>
                                <input type="text" class="form-control" id="numero" name="numero" value="123">
                            </div>

                            <div class="form-group mb-3">
                                <label for="bairro">Bairro:</label>
                                <input type="text" class="form-control" id="bairro" name="bairro" value="Centro">
                            </div>

                            <div class="form-group mb-3">
                                <label for="cidade">Cidade:</label>
                                <input type="text" class="form-control" id="cidade" name="cidade" value="Cidade Exemplo">
                            </div>

                            <div class="form-group mb-3">
                                <label for="cep">CEP:</label>
                                <input type="text" class="form-control" id="cep" name="cep" value="12345-678">
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="arquivos" role="tabpanel" aria-labelledby="arquivos-tab">
                        <form>
                            <div class="form-group mb-3">
                                <label for="arquivos">Selecionar Arquivos:</label>
                                <input type="file" class="form-control" id="arquivos" name="arquivos" multiple>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Coluna direita - Controle de Presença -->
            <div class="col-md-6 p-4 shadow-sm rounded bg-light presence-control">
                <h1 class="text-primary">Controle de Presença</h1>
                <table class="table table-hover" id="presenca-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Data</th>
                            <th>Presente</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="presenca-tbody">
                        <tr>
                            <td><input type="text" class="form-control" value="José Fulano"></td>
                            <td><input type="date" class="form-control" value="2024-11-01"></td>
                            <td><input type="checkbox" class="presenca-checkbox"></td>
                            <td><button type="button" class="btn btn-danger btn-sm delete-btn">Excluir</button></td>
                        </tr>
                    </tbody>
                </table>
                <div class="d-flex justify-content-end">
                    <button class="btn btn-success" id="add-row-btn">Adicionar Linha</button>
                    <button class="btn btn-success" id="save-presence-btn">Salvar Presença</button>
                </div>
            </div>
        </div>

        <!-- Caixa de Notificações (Histórico de Presença) -->
        <div class="row mt-4">
            <div class="col-md-12">
                <h1 class="text-primary custom-title">Notificações</h1>
                <div id="observacoes" class="border p-3">
                    <ul id="historico"></ul>
                </div>
            </div>
        </div>
    </main>

    <script src="/Scripts./script.js"></script>
    <script src="/Scripts/carregar-menu.js"></script>
    <script src="/Scripts/script-assistido.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
