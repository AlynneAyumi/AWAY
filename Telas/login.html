<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/Estilos/style-login.css">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>LOGIN</h1>
        <div class="login">
            <form id="loginForm">
                <label for="usuario">Usuário:</label><br>
                <input type="text" id="usuario" placeholder="admin@away.com" required><br>
                <label for="senha">Senha:</label><br>
                <input type="password" id="senha" placeholder="senha123" required><br>
                <button type="submit" id="botaoLogin">Login</button>
            </form>
        </div>
    </div>
    <script src="/Scripts/script-login.js"></script>
</body>
</html>
