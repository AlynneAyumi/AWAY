<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <title>AWAY</title>
</head>
<body>
    <div id="header"></div> <!-- Header será incluído aqui -->
    <main>
        <div class="mainContent">
            <div class="searchBar" id="searchBar">
                <input type="search" id="searchInput" placeholder="Pesquisar nome...">
                <button class="useButton" id="searchButton" onclick="search()">Pesquisar</button>
                <button class="useButton">Filtros</button>
            </div>
            <div class="searchResult" id="searchResult">
                <table id="resultTable">
                    <tr>
                        <th>NOME</th>
                        <th>AUTOS</th>
                        <th>GENÊRO</th>
                        <th>VARA</th>
                        <th>OBSERVAÇÃO</th>
                    </tr>
                </table>
            </div>
        </div>
    </main>
    <footer>
        Direitos reservados - Equipe AWAY
    </footer>
    <script src="carregar-menu.js"></script>
    <script src="script.js"></script>
</body>
</html>
